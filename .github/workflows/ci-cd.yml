name: CI/CD pipeline

on:
    push:
        branches: main
    pull_request:
        branches: main

jobs:
    backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Install dependencies
              run: uv sync

            - name: Run tests
              run: uv run python manage.py test

    frontend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Lint
              run: bun run lint

            - name: Type check
              run: bun run check

            - name: Build
              run: bun run build

    docker:
        runs-on: ubuntu-latest
        needs: [backend, frontend]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push backend
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/backend.dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/monitor-my-money-backend:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/monitor-my-money-backend:${{ github.sha }}

            - name: Build and Push frontend
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/frontend.dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/monitor-my-money-frontend:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/monitor-my-money-frontend:${{ github.sha }}
